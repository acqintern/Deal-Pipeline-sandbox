<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#0f2942; --navy-2:#15324f; --navy-3:#1d4068;
    --ink:#111b27; --slate:#4a5b6e; --muted:#7a8a9c; --faint:#a8b5c2;
    --line:#e4e9f0; --line-2:#d2dae4;
    --bg:#edf0f5; --panel:#ffffff; --panel-2:#f5f7fa; --panel-3:#edf0f5;
    --accent:#2f6df0; --accent-2:#1d52d6; --accent-soft:#e8f0fe;
    --pos:#0c7a43; --pos-soft:#e0f2ea; --neg:#c93c40; --neg-soft:#fce8e8;
    --warn:#b87214; --warn-soft:#fdf0d8;
    --radius:8px; --radius-lg:12px;
    --shadow:0 1px 3px rgba(16,30,50,.07);
    --shadow-lg:0 6px 24px rgba(16,30,50,.13);
    --row-h:44px;
    --font:'Inter',system-ui,sans-serif;
    --mono:'Inter',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font); color:var(--ink); background:var(--bg);
    -webkit-font-smoothing:antialiased; font-size:13.5px; line-height:1.5;
    font-weight:400;
  }
  #root{height:100%;}
  .num{font-family:var(--mono); font-variant-numeric:tabular-nums; letter-spacing:-.02em;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit; font-size:inherit; color:var(--ink);}
  ::selection{background:var(--accent-soft);}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#c2ccd8;border-radius:6px;border:2px solid var(--bg);}
  ::-webkit-scrollbar-thumb:hover{background:#a8b4c2;}
  .clip{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
  .fade{animation:fadeUp .24s ease both;}
  @keyframes scrimIn{from{opacity:0;}to{opacity:1;}}
  @keyframes drawerIn{from{transform:translateX(100%);}to{transform:none;}}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  @media print {
    @page { size: 1020px 1060px; margin: 0; }
    html, body { background: #fff !important; }
    body * { visibility: hidden !important; }
    #ic-memo-sheet, #ic-memo-sheet * { visibility: visible !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    #ic-memo-sheet { position: fixed !important; left: 0 !important; top: 0 !important; box-shadow: none !important; transform: scale(1); transform-origin: top left; }
    #ic-memo-sheet * { overflow: visible !important; }
    .memo-toolbar { display: none !important; }
  }
  @keyframes modalIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;}}
</style>
<link id="gfont-Inter" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
